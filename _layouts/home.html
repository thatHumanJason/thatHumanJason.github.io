<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/print.css">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="/" target="">Home</a></li>
        <li><a href="/about" target="">About</a></li>
        <li><a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a></li>
        <li><a href="https://twitter.com/{{ site.twitter_username }}" target="_blank">Twitter</a></li>
      </ul>
    </nav>
    {% for post in site.posts %}
    <article>
      <h1>{{ post.title }}</h1>
      <time>{{ post.date | date: "%A, %B %-d, %Y" }}</time>
      {{ post.excerpt }}
      <a class="read-more" href="{{ post.url }}">Read More</a>
    </article>
    {% endfor %}
    <footer>
      <ul>
        <li><a href="/feed.xml">RSS Feed</a></li>
        <li><a href="https://icons8.com/" target="_blank">Icons by Icons8</a></li>
      </ul>
    </footer>
    <script src="/js/script.js" charset="utf-8"></script>
  </body>
</html>
